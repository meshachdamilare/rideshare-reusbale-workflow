name: Docker Build and Push
description: Builds and pushes Docker image to AWS ECR using BuildKit

inputs:
  aws-region:
    required: true
  ecr-repository:
    required: true
  image-tag:
    required: true
  aws-access-key-id:
    required: true
  aws-secret-access-key:
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx with BuildKit
      shell: bash
      run: |
        docker buildx create --name mybuilder --driver remote tcp://localhost:1234 --use
        docker buildx inspect --bootstrap

    - name: Build and Push Docker Image
      shell: bash
      run: |
        docker buildx build \
          --push \
          -t ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }} \
          .

    - name: Print Image URI
      shell: bash
      run: |
        echo "Image pushed: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
