name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      ecr-repository:
        required: true
        type: string
      runs-on:
        required: false
        type: string
        default: mesh-runner-set
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Language
        id: detect
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "lang=node" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "lang=python" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "lang=go" >> $GITHUB_OUTPUT
          else
            echo "lang=unknown" >> $GITHUB_OUTPUT
          fi

      # ── Node 
      - name: Setup Node
        if: steps.detect.outputs.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Node - Install Dependencies
        if: steps.detect.outputs.lang == 'node'
        run: npm ci

      - name: Node - Lint
        if: steps.detect.outputs.lang == 'node'
        run: npm run lint --if-present

      - name: Node - Test
        if: steps.detect.outputs.lang == 'node'
        run: npm test --if-present

      # ── Python
      - name: Setup Python
        if: steps.detect.outputs.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python - Install Dependencies
        if: steps.detect.outputs.lang == 'python'
        run: pip install -r requirements.txt

      - name: Python - Lint
        if: steps.detect.outputs.lang == 'python'
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Python - Test
        if: steps.detect.outputs.lang == 'python'
        run: |
          pip install pytest
          pytest --tb=short

      # ── Go
      - name: Setup Go
        if: steps.detect.outputs.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go - Lint
        if: steps.detect.outputs.lang == 'go'
        run: |
          go vet ./...

      - name: Go - Test
        if: steps.detect.outputs.lang == 'go'
        run: go test ./...

  build-and-push:
    name: Build and Push to ECR
    runs-on: ${{ inputs.runs-on }}
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Push Docker Image
        uses: meshachdamilare/rideshare-workflows/.github/actions/docker-build-push@main
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          ecr-repository: ${{ inputs.ecr-repository }}
          image-tag: ${{ github.sha }}