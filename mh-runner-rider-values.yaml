githubConfigUrl: https://github.com/meshachdamilare/rideshare-rider-service
githubConfigSecret: mh-github-secret

runnerScaleSetName: mh-runner-rider

minRunners: 1
maxRunners: 6

controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

template:
  spec:
    containers:
    - name: runner
      image: ghcr.io/actions/actions-runner:latest
      command:
      - /home/runner/run.sh
      env:
      - name: BUILDKIT_HOST
        value: tcp://localhost:1234
      volumeMounts:
      - name: work
        mountPath: /home/runner/_work
    - name: buildkitd
      image: moby/buildkit:latest
      args:
      - --addr
      - tcp://0.0.0.0:1234
      securityContext:
        privileged: true
      volumeMounts:
      - name: work
        mountPath: /home/runner/_work
    volumes:
    - name: work
      emptyDir: {}
    restartPolicy: Never
